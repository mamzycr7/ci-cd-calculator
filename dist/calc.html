<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VUNA Calculator | Calc</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/bootstrap.min.css" />

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #FFFFFF;
      --surface: #F8F9FF;
      --card: #FFFFFF;
      --border: #E4E7F0;
      --accent: #6366F1;
      --accent-glow: rgba(99, 102, 241, 0.18);
      --accent-dim: #4F51C8;
      --text: #0F1626;
      --muted: #6B7280;
      --success: #059669;
      --operator: #EEF0FF;
      --operator-text: #4F46E5;
      --danger: #EF4444;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* ── NAVBAR ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-brand {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: -0.02em;
      color: var(--text);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .nav-brand .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
    }

    .nav-back {
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--muted);
      text-decoration: none;
      padding: 0.4rem 1rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      transition: color 0.2s, border-color 0.2s;
    }

    .nav-back:hover {
      color: var(--text);
      border-color: var(--accent);
    }

    /* ── THEME TOGGLE ── */
    .theme-toggle-btn {
      position: fixed;
      top: 70px;
      right: 1.25rem;
      z-index: 200;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--card);
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .theme-toggle-btn:hover {
      border-color: var(--accent);
      box-shadow: 0 2px 12px var(--accent-glow);
    }

    /* ── MAIN LAYOUT ── */
    main {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2.5rem 1rem 4rem;
    }

    .calc-wrapper {
      width: 100%;
      max-width: 420px;
    }

    /* ── HEADER CARD ── */
    .header-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.25rem;
      text-align: center;
    }

    .header-card h4 {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text);
      margin-bottom: 0.15rem;
    }

    .header-card p {
      font-size: 0.78rem;
      color: var(--muted);
      font-style: italic;
      margin: 0;
    }

    /* ── CALCULATOR CARD ── */
    .calculator-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(99, 102, 241, 0.08), 0 1px 4px rgba(0, 0, 0, 0.04);
      overflow: hidden;
    }

    /* ── DISPLAY ── */
    .display-area {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.25rem 0.85rem;
    }

    .display-expr {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      color: var(--muted);
      min-height: 1.2em;
      text-align: right;
      margin-bottom: 0.25rem;
      letter-spacing: 0.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .display-input {
      font-family: 'JetBrains Mono', monospace;
      font-size: 2.1rem;
      font-weight: 600;
      color: var(--text);
      text-align: right;
      background: transparent;
      border: none;
      outline: none;
      width: 100%;
      letter-spacing: -0.02em;
      padding: 0;
      caret-color: var(--accent);
    }

    .display-input::placeholder {
      color: var(--border);
    }

    /* ── BUTTON GRID ── */
    .btn-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      padding: 1rem;
    }

    .calc-btn {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      height: 56px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.15s, background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .calc-btn:active {
      transform: scale(0.94);
    }

    /* digit / misc */
    .calc-btn.num {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .calc-btn.num:hover {
      background: #ECEEFF;
      border-color: #C7CAF0;
    }

    /* operators */
    .calc-btn.op {
      background: var(--operator);
      color: var(--operator-text);
      border: 1px solid #D0D3F7;
      font-size: 1.15rem;
    }

    .calc-btn.op:hover {
      background: #E0E2FF;
    }

    /* clear / action */
    .calc-btn.action {
      background: #FEF2F2;
      color: var(--danger);
      border: 1px solid #FECACA;
    }

    .calc-btn.action:hover {
      background: #FEE2E2;
    }

    /* equals */
    .calc-btn.equals {
      grid-column: span 4;
      background: var(--accent);
      color: #fff;
      font-size: 1.1rem;
      font-weight: 600;
      height: 52px;
      box-shadow: 0 4px 14px var(--accent-glow);
    }

    .calc-btn.equals:hover {
      background: var(--accent-dim);
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.35);
    }

    /* geo button */
    .calc-btn.geo {
      background: #ECFDF5;
      color: var(--success);
      border: 1px solid #A7F3D0;
      font-size: 0.88rem;
    }

    .calc-btn.geo:hover {
      background: #D1FAE5;
    }

    /* ── SCROLL TO TOP ── */
    #scroll-to-calculator {
      position: fixed;
      bottom: 1.5rem;
      right: 1.25rem;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--card);
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      transition: border-color 0.2s, color 0.2s;
    }

    #scroll-to-calculator:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── GEO MODAL ── */
    .modal-content {
      border-radius: 16px;
      border: 1px solid var(--border);
      box-shadow: 0 8px 40px rgba(99, 102, 241, 0.15);
      font-family: 'Inter', sans-serif;
    }

    .modal-header {
      border-bottom: 1px solid var(--border);
      padding: 1.1rem 1.5rem;
    }

    .modal-title {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: -0.01em;
    }

    .modal-body {
      padding: 1.5rem;
    }

    .form-label {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }

    .form-select,
    .form-control {
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      color: var(--text);
      background: var(--surface);
      box-shadow: none !important;
    }

    .form-select:focus,
    .form-control:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow) !important;
    }

    .btn-geo-calc {
      width: 100%;
      height: 44px;
      border-radius: 10px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      margin-top: 1rem;
      box-shadow: 0 4px 14px var(--accent-glow);
      transition: background 0.2s, box-shadow 0.2s;
    }

    .btn-geo-calc:hover {
      background: var(--accent-dim);
    }

    .geo-result {
      margin-top: 1rem;
      padding: 0.9rem 1rem;
      border-radius: 10px;
      background: #EEF0FF;
      border: 1px solid #C7CAF0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      color: var(--operator-text);
    }

    .geo-result.d-none {
      display: none;
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    footer span {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    /* ── DARK THEME ── */
    body.dark {
      --bg: #0A0F1E;
      --surface: #141929;
      --card: #1A2035;
      --border: #252E47;
      --text: #F1F5F9;
      --muted: #94A3B8;
      --operator: #1E2747;
      --operator-text: #818CF8;
      --accent-glow: rgba(99, 102, 241, 0.35);
    }

    body.dark nav {
      background: rgba(10, 15, 30, 0.88);
    }

    body.dark .calc-btn.num {
      background: #1E2747;
      border-color: #2A3558;
      color: #F1F5F9;
    }

    body.dark .calc-btn.num:hover {
      background: #252E52;
    }

    body.dark .calc-btn.action {
      background: #2A1A1A;
      color: #F87171;
      border-color: #4A2020;
    }

    body.dark .calc-btn.action:hover {
      background: #331A1A;
    }

    body.dark .calc-btn.geo {
      background: #0D2A1E;
      color: #34D399;
      border-color: #0D3D26;
    }

    body.dark .geo-result {
      background: #1A2035;
      border-color: #252E47;
      color: #818CF8;
    }

    body.dark .modal-content {
      background: #141929;
    }

    body.dark .form-select,
    body.dark .form-control {
      background: #1A2035;
      color: #F1F5F9;
      border-color: #252E47;
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <nav>
    <a href="index.html" class="nav-brand">
      <span class="dot"></span>
      VUNA Calculator
    </a>
    <a href="index.html" class="nav-back">← Home</a>
  </nav>

  <!-- THEME TOGGLE -->
  <button class="theme-toggle-btn" id="theme-toggle" onclick="toggleTheme()" title="Toggle dark/light mode">🌙</button>

  <!-- MAIN -->
  <main>
    <div class="calc-wrapper">

      <!-- Header -->
      <div class="header-card">
        <h4>VUNA Calculator</h4>
        <p>Created by set 2025/26 Software Engineering</p>
      </div>

      <!-- Calculator -->
      <div class="calculator-card">

        <!-- Display -->
        <div class="display-area">
          <div class="display-expr" id="expr"></div>
          <input type="text" class="display-input" id="result" placeholder="0" disabled />
        </div>

        <!-- Buttons -->
        <div class="btn-grid">

          <!-- Row 1 -->
          <button class="calc-btn num" onclick="bracketToResult('(')">(</button>
          <button class="calc-btn num" onclick="bracketToResult(')')">)</button>
          <button class="calc-btn num" onclick="backspace()">⌫</button>
          <button class="calc-btn action" onclick="clearResult()">AC</button>

          <!-- Row 2 -->
          <button class="calc-btn num" onclick="appendToResult(7)">7</button>
          <button class="calc-btn num" onclick="appendToResult(8)">8</button>
          <button class="calc-btn num" onclick="appendToResult(9)">9</button>
          <button class="calc-btn op" onclick="operatorToResult('/')">÷</button>

          <!-- Row 3 -->
          <button class="calc-btn num" onclick="appendToResult(4)">4</button>
          <button class="calc-btn num" onclick="appendToResult(5)">5</button>
          <button class="calc-btn num" onclick="appendToResult(6)">6</button>
          <button class="calc-btn op" onclick="operatorToResult('*')">×</button>

          <!-- Row 4 -->
          <button class="calc-btn num" onclick="appendToResult(1)">1</button>
          <button class="calc-btn num" onclick="appendToResult(2)">2</button>
          <button class="calc-btn num" onclick="appendToResult(3)">3</button>
          <button class="calc-btn op" onclick="operatorToResult('-')">−</button>

          <!-- Row 5 -->
          <button class="calc-btn num" onclick="appendToResult('.')">.</button>
          <button class="calc-btn num" onclick="appendToResult(0)">0</button>
          <button class="calc-btn op" onclick="pi()">π</button>
          <button class="calc-btn op" onclick="operatorToResult('+')">+</button>

          <!-- Equals -->
          <button class="calc-btn equals" onclick="calculateResult()">=</button>

        </div>
      </div>

    </div>
  </main>

  <!-- SCROLL TO TOP -->
  <button id="scroll-to-calculator" title="Back to top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

  <!-- ── GEOMETRY MODAL ── -->
  <div class="modal fade" id="geoModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title">📐 Geometry Calculator</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">

          <label class="form-label">Shape</label>
          <select id="shape" class="form-select">
            <option value="square">Square</option>
            <option value="rectangle">Rectangle</option>
            <option value="circle">Circle</option>
            <option value="cube">Cube</option>
            <option value="cylinder">Cylinder</option>
          </select>

          <div class="mt-3" id="inputsArea"></div>

          <div class="mt-3">
            <label class="form-label">Operation</label>
            <select id="operation" class="form-select">
              <option value="area">Area</option>
              <option value="perimeter">Perimeter</option>
              <option value="volume">Volume</option>
            </select>
          </div>

          <button class="btn-geo-calc" onclick="computeGeometry()">Calculate</button>

          <div class="geo-result d-none" id="geoResult"></div>

        </div>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <span>© 2026 VUNA Calculator · Built for CI/CD Assignment</span>
  </footer>

  <script src="assets/js/bootstrap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="assets/js/math.js"></script>
  <script src="assets/js/script.js"></script>
  <script>
    function toggleTheme() {
      const isDark = document.body.classList.toggle('dark');
      document.getElementById('theme-toggle').textContent = isDark ? '☀️' : '🌙';
    }
  </script>
</body>

</html>
